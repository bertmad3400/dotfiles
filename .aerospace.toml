# Place a copy of this config to ~/.aerospace.toml
# After that, you can edit ~/.aerospace.toml to your liking

# It's not necessary to copy all keys to your config.
# If the key is missing in your config, "default-config.toml" will serve as a fallback

# You can use it to add commands that run after login to macOS user session.
# 'start-at-login' needs to be 'true' for 'after-login-command' to work
# Available commands: https://nikitabobko.github.io/AeroSpace/commands
after-login-command = []

# You can use it to add commands that run after AeroSpace startup.
# 'after-startup-command' is run after 'after-login-command'
# Available commands : https://nikitabobko.github.io/AeroSpace/commands
after-startup-command = []

# Notify Sketchybar about workspace change
exec-on-workspace-change = ['/bin/bash', '-c',
    '/Users/bertmad/.config/aerospace/sync-mode.sh "$AEROSPACE_FOCUSED_WORKSPACE"; /Users/bertmad/.config/aerospace/record-digit.sh "$AEROSPACE_FOCUSED_WORKSPACE"; sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE PREV_WORKSPACE=$AEROSPACE_PREV_WORKSPACE'
]

# Start AeroSpace at login
start-at-login = false

# Normalizations. See: https://nikitabobko.github.io/AeroSpace/guide#normalization
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# See: https://nikitabobko.github.io/AeroSpace/guide#layouts
# The 'accordion-padding' specifies the size of accordion padding
# You can set 0 to disable the padding feature
accordion-padding = 30

# Possible values: tiles|accordion
default-root-container-layout = 'tiles'

# Possible values: horizontal|vertical|auto
# 'auto' means: wide monitor (anything wider than high) gets horizontal orientation,
#               tall monitor (anything higher than wide) gets vertical orientation
default-root-container-orientation = 'auto'

# Possible values: (qwerty|dvorak)
# See https://nikitabobko.github.io/AeroSpace/guide#key-mapping
key-mapping.preset = 'qwerty'

# Mouse follows focus when focused monitor changes
# Drop it from your config, if you don't like this behavior
# See https://nikitabobko.github.io/AeroSpace/guide#on-focus-changed-callbacks
# See https://nikitabobko.github.io/AeroSpace/commands#move-mouse
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']
on-focus-changed = "move-mouse window-lazy-center"

# Gaps between windows (inner-*) and between monitor edges (outer-*).
[gaps]
inner.horizontal = 0
inner.vertical =   0
outer.left =       0
outer.bottom =     0
outer.top =        [{monitor."built-in.*" = 0}, 32] # Compensating for notch
outer.right =      0

[key-mapping.key-notation-to-key-code]
aa = "leftSquareBracket"
dots = "rightSquareBracket"
ae = "semicolon"
oe = "quote"
dash="slash"
quote="backslash"
dollar="backtick"
plus="minus"
backtick="equal"


# ============================================================================
# Layered workspaces
# ----------------------------------------------------------------------------
# 5 "spaces" (A..E), each containing 10 workspaces (X0..X9 = 50 total).
# - `main` mode IS space A (AeroSpace requires a `main` mode).
# - `space-b`..`space-e` modes correspond to spaces B..E.
# - Within any mode, ctrl-cmd-alt-{0..9} jumps to that space's workspace N.
# - ctrl-cmd-alt-{a..e} switches active space (mode + jump to X1).
# - ctrl-shift-alt-cmd-{0..9} moves the focused window to workspace N in the
#   current space.
# - All non-workspace bindings (focus/move/resize/terminal/service) are
#   duplicated across modes since AeroSpace modes don't inherit.
# ============================================================================

# ---------------------------------------------------------------------------
# main mode = SPACE A
# ---------------------------------------------------------------------------
[mode.main.binding]

ctrl-shift-alt-cmd-right = 'layout floating tiling'
ctrl-shift-alt-cmd-left = 'layout tiles horizontal vertical'

ctrl-cmd-alt-u = 'focus --boundaries-action wrap-around-the-workspace left'
ctrl-cmd-alt-i = 'focus --boundaries-action wrap-around-the-workspace down'
ctrl-cmd-alt-o = 'focus --boundaries-action wrap-around-the-workspace up'
ctrl-cmd-alt-p = 'focus --boundaries-action wrap-around-the-workspace right'

ctrl-shift-alt-cmd-u = 'move left'
ctrl-shift-alt-cmd-i = 'move down'
ctrl-shift-alt-cmd-o = 'move up'
ctrl-shift-alt-cmd-p = 'move right'

ctrl-cmd-alt-h = 'focus-monitor --wrap-around prev'
ctrl-cmd-alt-l = 'focus-monitor --wrap-around next'
ctrl-cmd-alt-j = 'exec-and-forget /Users/bertmad/.config/aerospace/cycle.sh focus prev'
ctrl-cmd-alt-k = 'exec-and-forget /Users/bertmad/.config/aerospace/cycle.sh focus next'

ctrl-shift-alt-cmd-h = 'move-node-to-monitor --focus-follows-window --wrap-around prev'
ctrl-shift-alt-cmd-l = 'move-node-to-monitor --focus-follows-window --wrap-around next'
ctrl-shift-alt-cmd-j = 'exec-and-forget /Users/bertmad/.config/aerospace/cycle.sh move prev'
ctrl-shift-alt-cmd-k = 'exec-and-forget /Users/bertmad/.config/aerospace/cycle.sh move next'

ctrl-cmd-alt-dash = 'resize smart -50'
ctrl-cmd-alt-plus = 'resize smart +50'

# Within-space workspace nav (space A)
ctrl-cmd-alt-0 = 'workspace A0'
ctrl-cmd-alt-1 = 'workspace A1'
ctrl-cmd-alt-2 = 'workspace A2'
ctrl-cmd-alt-3 = 'workspace A3'
ctrl-cmd-alt-4 = 'workspace A4'
ctrl-cmd-alt-5 = 'workspace A5'
ctrl-cmd-alt-6 = 'workspace A6'
ctrl-cmd-alt-7 = 'workspace A7'
ctrl-cmd-alt-8 = 'workspace A8'
ctrl-cmd-alt-9 = 'workspace A9'

# Move window within space A
ctrl-shift-alt-cmd-0 = 'move-node-to-workspace A0'
ctrl-shift-alt-cmd-1 = 'move-node-to-workspace A1'
ctrl-shift-alt-cmd-2 = 'move-node-to-workspace A2'
ctrl-shift-alt-cmd-3 = 'move-node-to-workspace A3'
ctrl-shift-alt-cmd-4 = 'move-node-to-workspace A4'
ctrl-shift-alt-cmd-5 = 'move-node-to-workspace A5'
ctrl-shift-alt-cmd-6 = 'move-node-to-workspace A6'
ctrl-shift-alt-cmd-7 = 'move-node-to-workspace A7'
ctrl-shift-alt-cmd-8 = 'move-node-to-workspace A8'
ctrl-shift-alt-cmd-9 = 'move-node-to-workspace A9'

# Switch space (already in A)
ctrl-cmd-alt-a = 'exec-and-forget /Users/bertmad/.config/aerospace/goto-space.sh A'
ctrl-cmd-alt-b = 'exec-and-forget /Users/bertmad/.config/aerospace/goto-space.sh B'
ctrl-cmd-alt-c = 'exec-and-forget /Users/bertmad/.config/aerospace/goto-space.sh C'
ctrl-cmd-alt-d = 'exec-and-forget /Users/bertmad/.config/aerospace/goto-space.sh D'
ctrl-cmd-alt-e = 'exec-and-forget /Users/bertmad/.config/aerospace/goto-space.sh E'

# Move focused window to another space, preserving digit (A1 -> E1).
ctrl-shift-alt-cmd-a = 'exec-and-forget /Users/bertmad/.config/aerospace/move-to-space.sh A'
ctrl-shift-alt-cmd-b = 'exec-and-forget /Users/bertmad/.config/aerospace/move-to-space.sh B'
ctrl-shift-alt-cmd-c = 'exec-and-forget /Users/bertmad/.config/aerospace/move-to-space.sh C'
ctrl-shift-alt-cmd-d = 'exec-and-forget /Users/bertmad/.config/aerospace/move-to-space.sh D'
ctrl-shift-alt-cmd-e = 'exec-and-forget /Users/bertmad/.config/aerospace/move-to-space.sh E'

ctrl-cmd-alt-tab = 'workspace-back-and-forth'
ctrl-shift-alt-cmd-tab = 'move-workspace-to-monitor --wrap-around next'

ctrl-shift-alt-cmd-s = 'exec-and-forget sketchybar --reload'

ctrl-cmd-alt-w = 'close'

ctrl-shift-alt-cmd-aa = 'mode service'

