ctrl-shift-alt-cmd-e = 'exec-and-forget /Users/bertmad/.config/aerospace/move-to-space.sh E'

ctrl-cmd-alt-tab = 'workspace-back-and-forth'
ctrl-shift-alt-cmd-tab = 'move-workspace-to-monitor --wrap-around next'

ctrl-shift-alt-cmd-s = 'exec-and-forget sketchybar --reload'

ctrl-cmd-alt-w = 'close'

ctrl-shift-alt-cmd-aa = 'mode service'

# ---------------------------------------------------------------------------
# service mode
# ---------------------------------------------------------------------------
[mode.service.binding]
esc = ['reload-config', 'mode main']
r = ['flatten-workspace-tree', 'mode main']
f = ['fullscreen', 'mode main']
backspace = ['close-all-windows-but-current', 'mode main']

ctrl-cmd-alt-h = ['join-with left', 'mode main']
ctrl-cmd-alt-j = ['join-with down', 'mode main']
ctrl-cmd-alt-k = ['join-with up', 'mode main']
ctrl-cmd-alt-l = ['join-with right', 'mode main']

# ============================================================================
