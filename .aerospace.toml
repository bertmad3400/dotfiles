# Place a copy of this config to ~/.aerospace.toml
# After that, you can edit ~/.aerospace.toml to your liking

# It's not necessary to copy all keys to your config.
# If the key is missing in your config, "default-config.toml" will serve as a fallback

# You can use it to add commands that run after login to macOS user session.
# 'start-at-login' needs to be 'true' for 'after-login-command' to work
# Available commands: https://nikitabobko.github.io/AeroSpace/commands
after-login-command = []

# You can use it to add commands that run after AeroSpace startup.
# 'after-startup-command' is run after 'after-login-command'
# Available commands : https://nikitabobko.github.io/AeroSpace/commands
after-startup-command = ['exec-and-forget ~/Downloads/SketchyBar/bin/sketchybar']

# Notify Sketchybar about workspace change
exec-on-workspace-change = ['/bin/bash', '-c',
    'sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE PREV_WORKSPACE=$AEROSPACE_PREV_WORKSPACE'
]

# Start AeroSpace at login
start-at-login = false

# Normalizations. See: https://nikitabobko.github.io/AeroSpace/guide#normalization
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# See: https://nikitabobko.github.io/AeroSpace/guide#layouts
# The 'accordion-padding' specifies the size of accordion padding
# You can set 0 to disable the padding feature
accordion-padding = 30

# Possible values: tiles|accordion
default-root-container-layout = 'tiles'

# Possible values: horizontal|vertical|auto
# 'auto' means: wide monitor (anything wider than high) gets horizontal orientation,
#               tall monitor (anything higher than wide) gets vertical orientation
default-root-container-orientation = 'auto'

# Possible values: (qwerty|dvorak)
# See https://nikitabobko.github.io/AeroSpace/guide#key-mapping
key-mapping.preset = 'qwerty'

# Mouse follows focus when focused monitor changes
# Drop it from your config, if you don't like this behavior
# See https://nikitabobko.github.io/AeroSpace/guide#on-focus-changed-callbacks
# See https://nikitabobko.github.io/AeroSpace/commands#move-mouse
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']
on-focus-changed = "move-mouse window-lazy-center"

# Gaps between windows (inner-*) and between monitor edges (outer-*).
# Possible values:
# - Constant:     gaps.outer.top = 8
# - Per monitor:  gaps.outer.top = [{ monitor.main = 16 }, { monitor."some-pattern" = 32 }, 24]
#                 In this example, 24 is a default value when there is no match.
#                 Monitor pattern is the same as for 'workspace-to-monitor-force-assignment'.
#                 See: https://nikitabobko.github.io/AeroSpace/guide#assign-workspaces-to-monitors
[gaps]
inner.horizontal = 0
inner.vertical =   0
outer.left =       0
outer.bottom =     0
outer.top =        [{monitor."built-in.*" = 0}, 32] # Compensating for notch
outer.right =      0

[key-mapping.key-notation-to-key-code]
aa = "leftSquareBracket"
dots = "rightSquareBracket"
ae = "semicolon"
oe = "quote"
dash="slash"
quote="backslash"
dollar="backtick"
plus="minus"
backtick="equal"




# 'main' binding mode declaration
# See: https://nikitabobko.github.io/AeroSpace/guide#binding-modes
# 'main' binding mode must be always presented
[mode.main.binding]

# All possible keys:
# - Letters.        a, b, c, ..., z
# - Numbers.        0, 1, 2, ..., 9
# - Keypad numbers. keypad0, keypad1, keypad2, ..., keypad9
# - F-keys.         f1, f2, ..., f20
# - Special keys.   minus, equal, period, comma, slash, backslash, quote, semicolon, backtick,
#                   leftSquareBracket, rightSquareBracket, space, enter, esc, backspace, tab
# - Keypad special. keypadClear, keypadDecimalMark, keypadDivide, keypadEnter, keypadEqual,
#                   keypadMinus, keypadMultiply, keypadPlus
# - Arrows.         left, down, up, right

# All possible modifiers: cmd, alt, shift, shift

# All possible commands: https://nikitabobko.github.io/AeroSpace/commands

# See: https://nikitabobko.github.io/AeroSpace/commands#exec-and-forget
# You can uncomment the following lines to open up terminal with alt + enter shortcut (like in i3)
ctrl-cmd-alt-enter = '''exec-and-forget osascript -e '
    tell application "iTerm"
        create window with default profile
        activate
    end tell'
'''

# See: https://nikitabobko.github.io/AeroSpace/commands#layout
ctrl-shift-alt-cmd-right = 'layout floating tiling'
ctrl-shift-alt-cmd-left = 'layout tiles horizontal vertical'

# See: https://nikitabobko.github.io/AeroSpace/commands#focus

ctrl-cmd-alt-u = 'focus --boundaries-action wrap-around-the-workspace left'
ctrl-cmd-alt-i = 'focus --boundaries-action wrap-around-the-workspace down'
ctrl-cmd-alt-o = 'focus --boundaries-action wrap-around-the-workspace up'
ctrl-cmd-alt-p = 'focus --boundaries-action wrap-around-the-workspace right'

ctrl-shift-alt-cmd-u = 'move left'
ctrl-shift-alt-cmd-i = 'move down'
ctrl-shift-alt-cmd-o = 'move up'
ctrl-shift-alt-cmd-p = 'move right'


ctrl-cmd-alt-h = 'focus-monitor --wrap-around prev'
ctrl-cmd-alt-l = 'focus-monitor --wrap-around next'
ctrl-cmd-alt-j = 'workspace --wrap-around prev'
ctrl-cmd-alt-k = 'workspace --wrap-around next'

ctrl-shift-alt-cmd-h = 'move-node-to-monitor --focus-follows-window --wrap-around prev'
ctrl-shift-alt-cmd-l = 'move-node-to-monitor --focus-follows-window --wrap-around next'
ctrl-shift-alt-cmd-j = 'move-node-to-workspace --focus-follows-window --wrap-around prev'
ctrl-shift-alt-cmd-k = 'move-node-to-workspace --focus-follows-window --wrap-around next'

# See: https://nikitabobko.github.io/AeroSpace/commands#resize
ctrl-cmd-alt-dash = 'resize smart -50'
ctrl-cmd-alt-plus = 'resize smart +50'

# See: https://nikitabobko.github.io/AeroSpace/commands#workspace
ctrl-cmd-alt-1 = 'workspace 1'
ctrl-cmd-alt-2 = 'workspace 2'
ctrl-cmd-alt-3 = 'workspace 3'
ctrl-cmd-alt-4 = 'workspace 4'
ctrl-cmd-alt-5 = 'workspace 5'
ctrl-cmd-alt-6 = 'workspace 6'
ctrl-cmd-alt-7 = 'workspace 7'
ctrl-cmd-alt-8 = 'workspace 8'
ctrl-cmd-alt-9 = 'workspace 9'
ctrl-cmd-alt-a = 'workspace A'
ctrl-cmd-alt-b = 'workspace B'
ctrl-cmd-alt-c = 'workspace C'
ctrl-cmd-alt-d = 'workspace D'
ctrl-cmd-alt-e = 'workspace E'
ctrl-cmd-alt-f = 'workspace F'
ctrl-cmd-alt-g = 'workspace G'

# See: https://nikitabobko.github.io/AeroSpace/commands#move-node-to-workspace
ctrl-shift-alt-cmd-1 = 'move-node-to-workspace 1'
ctrl-shift-alt-cmd-2 = 'move-node-to-workspace 2'
ctrl-shift-alt-cmd-3 = 'move-node-to-workspace 3'
ctrl-shift-alt-cmd-4 = 'move-node-to-workspace 4'
ctrl-shift-alt-cmd-5 = 'move-node-to-workspace 5'
ctrl-shift-alt-cmd-6 = 'move-node-to-workspace 6'
ctrl-shift-alt-cmd-7 = 'move-node-to-workspace 7'
ctrl-shift-alt-cmd-8 = 'move-node-to-workspace 8'
ctrl-shift-alt-cmd-9 = 'move-node-to-workspace 9'
ctrl-shift-alt-cmd-a = 'move-node-to-workspace A'
ctrl-shift-alt-cmd-b = 'move-node-to-workspace B'
ctrl-shift-alt-cmd-c = 'move-node-to-workspace C'
ctrl-shift-alt-cmd-d = 'move-node-to-workspace D'
ctrl-shift-alt-cmd-e = 'move-node-to-workspace E'
ctrl-shift-alt-cmd-f = 'move-node-to-workspace F'
ctrl-shift-alt-cmd-g = 'move-node-to-workspace G'

# See: https://nikitabobko.github.io/AeroSpace/commands#workspace-back-and-forth
ctrl-cmd-alt-tab = 'workspace-back-and-forth'
# See: https://nikitabobko.github.io/AeroSpace/commands#move-workspace-to-monitor
ctrl-shift-alt-cmd-tab = 'move-workspace-to-monitor --wrap-around next'

# See: https://nikitabobko.github.io/AeroSpace/commands#mode
ctrl-shift-alt-cmd-aa = 'mode service'

# 'service' binding mode declaration.
# See: https://nikitabobko.github.io/AeroSpace/guide#binding-modes
[mode.service.binding]
esc = ['reload-config', 'mode main']
r = ['flatten-workspace-tree', 'mode main'] # reset layout
#s = ['layout sticky tiling', 'mode main'] # sticky is not yet supported https://github.com/nikitabobko/AeroSpace/issues/2
f = ['fullscreen', 'mode main'] # Toggle between floating and tiling layout
backspace = ['close-all-windows-but-current', 'mode main']

ctrl-cmd-alt-h = ['join-with left', 'mode main']
ctrl-cmd-alt-j = ['join-with down', 'mode main']
ctrl-cmd-alt-k = ['join-with up', 'mode main']
ctrl-cmd-alt-l = ['join-with right', 'mode main']

[workspace-to-monitor-force-assignment]
1 = 'main'
2 = 'main'
3 = 'main'
4 = 'main'
5 = 'main'
6 = 'main'
7 = 'main'
8 = 'main'
9 = 'main'
A = 'secondary'
B = 'secondary'
C = 'secondary'
D = 'secondary'
E = 'secondary'
F = 'secondary'
G = 'secondary'
